<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحرب مع كارم | المحرك السيادي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --primary-red: #dc2626; --bg-dark: #050505; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: #fff; overflow-x: hidden; }
      .tab-content { display: none; opacity: 0; }
      .tab-content.active { display: block; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .nav-blur { backdrop-filter: blur(25px); background: rgba(5, 5, 5, 0.85); border-top: 1px solid rgba(255, 255, 255, 0.08); }
      .active-tab { color: var(--primary-red); transform: translateY(-4px); }
      .search-gradient { background: linear-gradient(90deg, #1a1a1a, #0a0a0a); border: 1px solid rgba(220, 38, 38, 0.3); }
      .result-card { background: #111; border: 1px solid #222; transition: all 0.2s; }
      .result-card:active { background: #1a1a1a; border-color: #dc2626; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 nav-blur border-b border-white/5 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-red-600 p-2 rounded-xl shadow-lg shadow-red-900/30"><i data-lucide="shield-check" class="w-5 h-5 text-white"></i></div>
            <h1 class="text-xl font-black italic tracking-tighter">الحرب مع كارم</h1>
        </div>
        <div class="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-full border border-white/5">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-zinc-300 uppercase tracking-widest text-xs">Aura Live</span>
        </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto" id="main-content">
        
        <div class="mb-6 relative">
            <div class="search-gradient p-1 rounded-2xl flex items-center gap-3">
                <div class="pr-3 text-red-600"><i data-lucide="search" class="w-5 h-5"></i></div>
                <input type="text" id="sovereignSearch" placeholder="ابحث عن (صلاح، مرموش، مباريات الليلة)..." 
                       class="bg-transparent border-none outline-none w-full py-3 text-sm text-white placeholder-zinc-500 font-bold">
            </div>
            <div id="searchResults" class="mt-4 space-y-3 hidden">
                </div>
        </div>

        <div id="radar-tab" class="tab-content active space-y-6">
            <div class="bg-zinc-900/40 p-5 rounded-3xl border border-white/5">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase flex items-center gap-2 mb-4"><i data-lucide="zap" class="w-3 h-3 text-red-600"></i> رادار اللحظة</h3>
                <p class="text-xs text-zinc-400">استخدم مربع البحث بالأعلى للوصول لـ "كنوز العلم" المحصنة.</p>
            </div>
        </div>

        <div id="profile-tab" class="tab-content py-10 text-center">
            <div class="relative w-24 h-24 mx-auto mb-6">
                <div class="relative w-full h-full bg-zinc-900 rounded-full border-2 border-red-600/50 flex items-center justify-center">
                    <i data-lucide="fingerprint" class="w-10 h-10 text-red-600"></i>
                </div>
            </div>
            <h3 class="text-xl font-black italic">القائد كارم</h3>
            <p class="text-red-500 text-[10px] font-black uppercase mt-1">وحدة هندسة العقول</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 nav-blur px-6 py-4 pb-10 flex justify-around items-center">
        <button onclick="openTab('radar', this)" class="tab-btn active-tab flex flex-col items-center gap-1"><i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[10px] font-black">الرادار</span></button>
        <button onclick="openTab('profile', this)" class="tab-btn text-zinc-500 flex flex-col items-center gap-1"><i data-lucide="fingerprint" class="w-6 h-6"></i><span class="text-[10px] font-black">السيادة</span></button>
    </nav>

    <script>
        // قاعدة البيانات السيادية المدمجة
        const sovereignDB = [
            { title: "مانشستر سيتي × ريال مدريد", type: "مباراة اليوم", desc: "إياب دور الـ 16 - 10:00 م بتوقيت القاهرة.", icon: "swords" },
            { title: "آرسنال × باير ليفركوزن", type: "مباراة اليوم", desc: "مواجهة حاسمة في لندن - 10:00 م.", icon: "swords" },
            { title: "محمد صلاح", type: "لاعب سيادي", desc: "عقد مستمر مع ليفربول حتى 2027. قيمة سوقية: €30M.", icon: "star" },
            { title: "عمر مرموش", type: "لاعب سيادي", desc: "أداء استثنائي مع مانشستر سيتي. المهاجم القادم لمصر.", icon: "zap" },
            { title: "لامين يامال", type: "بورصة اللاعبين", desc: "أغلى لاعب في العالم 2026: €343.1M.", icon: "award" },
            { title: "تنبؤ الترند", type: "هندسة عقول", desc: "رحيل صلاح المفاجئ سيشعل ميركاتو 2026.", icon: "trending-up" }
        ];

        document.addEventListener('DOMContentLoaded', () => { 
            lucide.createIcons();
            
            const searchInput = document.getElementById('sovereignSearch');
            const resultsDiv = document.getElementById('searchResults');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                resultsDiv.innerHTML = '';
                
                if (query.length > 0) {
                    const filtered = sovereignDB.filter(item => 
                        item.title.toLowerCase().includes(query) |

| 
                        item.type.toLowerCase().includes(query)
                    );

                    if (filtered.length > 0) {
                        resultsDiv.classList.remove('hidden');
                        filtered.forEach(item => {
                            resultsDiv.innerHTML += `
                                <div class="result-card p-4 rounded-xl">
                                    <div class="flex items-center gap-3">
                                        <div class="text-red-500"><i data-lucide="info" class="w-4 h-4"></i></div>
                                        <div>
                                            <div class="text-[10px] text-red-500 font-black uppercase">${item.type}</div>
                                            <div class="text-sm font-bold">${item.title}</div>
                                            <div class="text-[10px] text-zinc-500 mt-1">${item.desc}</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        lucide.createIcons();
                    } else {
                        resultsDiv.innerHTML = '<p class="text-center text-[10px] text-zinc-600">لا توجد نتائج في قاعدة المعلومات الحالية.</p>';
                    }
                } else {
                    resultsDiv.classList.add('hidden');
                }
            });
        });

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active-tab'); b.classList.add('text-zinc-500'); });
            document.getElementById(tabId + '-tab').classList.add('active');
            btn.classList.add('active-tab'); btn.classList.remove('text-zinc-500');
        }
    </script>
</body>
</html>
